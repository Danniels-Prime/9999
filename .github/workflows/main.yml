name: OMEGA CODEX TRACKER COMMIT LIVE
        - name: Install dependencies
        working-directory: ./node.modules
        run: npm install
        
on:
  push:
    branches: [ main ]

jobs:
build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./node_module
    steps:
      - uses: actions/checkout@v4 
      - name: Install dependencies
        run: npm install
      - name: Build Web
        run: npm run build
  build:
    runs-on: ubuntu-latest

      - name: Build Android
        run: |
          npx cap add android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
          
