name: OMEGA CODEX TRACKER COMMITMENT LIVE

on:
  push:
    branches: [ main ]
working-directory: android/app
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android/app
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Build Web
        run: npm run build
      - name: Build Android
        run: |
          npx cap add android
          cd android
          ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apkapk
          
